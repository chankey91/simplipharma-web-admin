# Optional: run Typesense on your own Linux host (not used by Firebase deploy).
# Server image pinned to current stable: typesense/typesense:30.1
# NPM client: `typesense@^3.0.5` in package.json — run `npm install typesense@latest` in this folder to refresh.
#
# Usage:
#   cd functions
#   echo "TS_API_KEY=$(openssl rand -hex 24)" >> .env
#   docker compose -f docker-compose.typesense.yml --env-file .env up -d
#
# Then set Firebase config: typesense.host, typesense.api_key, typesense.protocol=https, typesense.port=443
# (or http + 8108 if you expose this port directly — use TLS in production).

services:
  typesense:
    image: typesense/typesense:30.1
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command:
      - "--data-dir"
      - "/data"
      - "--api-key"
      - "${TS_API_KEY:?Set TS_API_KEY in .env}"
      - "--listen-port"
      - "8108"
      - "--enable-cors"

volumes:
  typesense-data:
